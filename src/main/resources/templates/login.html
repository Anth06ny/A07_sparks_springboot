<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h2 th:text="${errorMessage ?: ''}"></h2>

<form method="post" action="/loginSubmit" th:object="${userEntity}" >


    <p>Login : <input th:field="*{login}" type="text"/></p>
    <p>Password : <input th:field="*{password}"  type="password"/></p>

    <p><input type="submit" value="Submit"/></p>
</form>

</body>
</html>
